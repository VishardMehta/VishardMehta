<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#141C28" stroke-width="1"/>
    </pattern>

    <!-- animated gradient sweeping through the name -->
    <linearGradient id="sweep" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="500" y2="0" spreadMethod="reflect">
      <stop offset="0" stop-color="#4DC3FF"/>
      <stop offset="0.5" stop-color="#E85D9E"/>
      <stop offset="1" stop-color="#FFB000"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="1000 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- soft neon glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- scanline fade -->
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4DC3FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#4DC3FF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#4DC3FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1000" height="260" rx="12" fill="#0A0E14"/>
  <rect width="1000" height="260" rx="12" fill="url(#grid)"/>

  <!-- travelling scanline -->
  <rect x="0" width="1000" height="50" fill="url(#scan)">
    <animate attributeName="y" values="-50;260" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- HUD corner brackets -->
  <g stroke="#4DC3FF" stroke-width="2" opacity="0.7" fill="none">
    <path d="M14 34 V22 a8 8 0 0 1 8-8 H34"/>
    <path d="M966 14 H978 a8 8 0 0 1 8 8 V34"/>
    <path d="M14 226 V238 a8 8 0 0 0 8 8 H34"/>
    <path d="M986 226 V238 a8 8 0 0 1 -8 8 H966"/>
  </g>

  <!-- top-left terminal path -->
  <text x="40" y="42" font-family="'Courier New', monospace" font-size="14" fill="#8B949E">~/vishard-mehta $</text>

  <!-- top-right status with pulsing dot -->
  <g>
    <circle cx="836" cy="37" r="4" fill="#3DDC84">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="848" y="42" font-family="'Courier New', monospace" font-size="14" fill="#8B949E">STATUS: BUILDING</text>
  </g>

  <!-- glitch layers behind the name (chromatic aberration flicker) -->
  <text x="500" y="128" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="8" fill="#FF4D6D" opacity="0">
    VISHARD MEHTA
    <animate attributeName="opacity" calcMode="discrete" values="0;0.8;0;0.8;0;0" keyTimes="0;0.41;0.43;0.72;0.74;1" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" calcMode="discrete" values="0 0;3 0;0 0;-3 1;0 0;0 0" keyTimes="0;0.41;0.43;0.72;0.74;1" dur="6s" repeatCount="indefinite"/>
  </text>
  <text x="500" y="128" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="8" fill="#4DC3FF" opacity="0">
    VISHARD MEHTA
    <animate attributeName="opacity" calcMode="discrete" values="0;0.8;0;0.8;0;0" keyTimes="0;0.415;0.435;0.725;0.745;1" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" calcMode="discrete" values="0 0;-3 0;0 0;3 -1;0 0;0 0" keyTimes="0;0.415;0.435;0.725;0.745;1" dur="6s" repeatCount="indefinite"/>
  </text>

  <!-- the name -->
  <text x="500" y="128" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="8" fill="url(#sweep)" filter="url(#glow)">VISHARD MEHTA</text>

  <!-- terminal subtitle with blinking cursor -->
  <text x="500" y="168" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" fill="#8B949E">&gt; ml_engineer &amp;&amp; quant_dev &amp;&amp; systems_thinker</text>
  <rect x="762" y="154" width="9" height="17" fill="#4DC3FF">
    <animate attributeName="opacity" calcMode="discrete" values="1;0" keyTimes="0;0.5" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- pacman strip: dots vanish as pacman passes (9s loop) -->
  <g>
    <!-- dots: each fades exactly when pacman reaches its x -->
    <circle cx="200" cy="215" r="4" fill="#FFB000"><animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.115;0.125;0.97;1" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="270" cy="215" r="4" fill="#FFB000"><animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.2;0.212;0.97;1" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="215" r="4" fill="#FFB000"><animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.288;0.3;0.97;1" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="410" cy="215" r="4" fill="#FFB000"><animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.375;0.387;0.97;1" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="215" r="4" fill="#FFB000"><animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.463;0.475;0.97;1" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="215" r="4" fill="#FFB000"><animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.55;0.562;0.97;1" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="215" r="4" fill="#FFB000"><animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.638;0.65;0.97;1" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="690" cy="215" r="4" fill="#FFB000"><animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.725;0.737;0.97;1" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="215" r="6" fill="#E85D9E"><animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.813;0.825;0.97;1" dur="9s" repeatCount="indefinite"/><animate attributeName="r" values="6;7;6" dur="0.8s" repeatCount="indefinite"/></circle>

    <!-- pacman -->
    <g>
      <animateTransform attributeName="transform" type="translate" from="110 215" to="850 215" dur="9s" repeatCount="indefinite"/>
      <path fill="#FFD23F">
        <animate attributeName="d"
          values="M0,0 L11,-8 A14,14 0 1,0 11,8 Z;M0,0 L14,-1.5 A14,14 0 1,0 14,1.5 Z;M0,0 L11,-8 A14,14 0 1,0 11,8 Z"
          dur="0.36s" repeatCount="indefinite"/>
      </path>
      <circle cx="1" cy="-7" r="1.7" fill="#0A0E14"/>
    </g>
  </g>

  <!-- ambient particles -->
  <circle cx="120" cy="90" r="2" fill="#4DC3FF" opacity="0.5">
    <animate attributeName="cy" values="90;70;90" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="905" cy="140" r="2" fill="#E85D9E" opacity="0.4">
    <animate attributeName="cy" values="140;115;140" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="180" r="1.5" fill="#FFB000" opacity="0.5">
    <animate attributeName="cy" values="180;160;180" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="940" cy="70" r="1.5" fill="#4DC3FF" opacity="0.4">
    <animate attributeName="cy" values="70;95;70" dur="9s" repeatCount="indefinite"/>
  </circle>
</svg>
