<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="gridA" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#141C28" stroke-width="1"/>
    </pattern>

    <!-- cream → toffee sweep for the name -->
    <linearGradient id="sweepA" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="480" y2="0" spreadMethod="reflect">
      <stop offset="0" stop-color="#E8D5A9"/>
      <stop offset="0.45" stop-color="#C68642"/>
      <stop offset="1" stop-color="#4DC3FF"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="960 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- cookie body: baked edge is darker -->
    <radialGradient id="doughA" cx="0.42" cy="0.38" r="0.72">
      <stop offset="0" stop-color="#EFDCB4"/>
      <stop offset="0.6" stop-color="#D9B476"/>
      <stop offset="1" stop-color="#8B5A2B"/>
    </radialGradient>

    <filter id="glowA" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="scanA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8D5A9" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#E8D5A9" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#E8D5A9" stop-opacity="0"/>
    </linearGradient>

    <!-- bite mask: three scoops removed in sequence, restored on reset -->
    <mask id="biteA">
      <rect x="0" y="0" width="200" height="200" fill="white"/>
      <circle cx="52" cy="14" r="0" fill="black">
        <animate attributeName="r" values="0;0;17;17;17;0" keyTimes="0;0.18;0.26;0.86;0.95;1" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="56" cy="52" r="0" fill="black">
        <animate attributeName="r" values="0;0;16;16;16;0" keyTimes="0;0.42;0.5;0.86;0.95;1" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="30" cy="74" r="0" fill="black">
        <animate attributeName="r" values="0;0;15;15;15;0" keyTimes="0;0.64;0.72;0.86;0.95;1" dur="8s" repeatCount="indefinite"/>
      </circle>
    </mask>
  </defs>

  <rect width="1000" height="260" rx="12" fill="#0A0E14"/>
  <rect width="1000" height="260" rx="12" fill="url(#gridA)"/>
  <rect x="0" width="1000" height="50" fill="url(#scanA)">
    <animate attributeName="y" values="-50;260" dur="7s" repeatCount="indefinite"/>
  </rect>

  <g stroke="#C68642" stroke-width="2" opacity="0.7" fill="none">
    <path d="M14 34 V22 a8 8 0 0 1 8-8 H34"/>
    <path d="M966 14 H978 a8 8 0 0 1 8 8 V34"/>
    <path d="M14 226 V238 a8 8 0 0 0 8 8 H34"/>
    <path d="M986 226 V238 a8 8 0 0 1 -8 8 H966"/>
  </g>

  <text x="40" y="42" font-family="'Courier New', monospace" font-size="14" fill="#8B949E">~/vishard-mehta $</text>
  <g>
    <circle cx="836" cy="37" r="4" fill="#E8D5A9">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="848" y="42" font-family="'Courier New', monospace" font-size="14" fill="#8B949E">STATUS: BUILDING</text>
  </g>

  <!-- name -->
  <text x="500" y="122" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="8" fill="#8B5A2B" opacity="0">
    VISHARD MEHTA
    <animate attributeName="opacity" calcMode="discrete" values="0;0.7;0;0.7;0;0" keyTimes="0;0.41;0.43;0.72;0.74;1" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" calcMode="discrete" values="0 0;3 0;0 0;-3 1;0 0;0 0" keyTimes="0;0.41;0.43;0.72;0.74;1" dur="6s" repeatCount="indefinite"/>
  </text>
  <text x="500" y="122" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="8" fill="url(#sweepA)" filter="url(#glowA)">VISHARD MEHTA</text>

  <text x="500" y="160" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" fill="#8B949E">&gt; ml_engineer &amp;&amp; quant_dev &amp;&amp; systems_thinker</text>
  <rect x="762" y="146" width="9" height="17" fill="#C68642">
    <animate attributeName="opacity" calcMode="discrete" values="1;0" keyTimes="0;0.5" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== THE COOKIE ===== -->
  <g transform="translate(455 178)">
    <!-- cookie + chips, masked by the bites -->
    <g mask="url(#biteA)">
      <circle cx="45" cy="45" r="36" fill="url(#doughA)" stroke="#7A4A22" stroke-width="1.5"/>
      <circle cx="32" cy="32" r="4.4" fill="#4A2C17"/>
      <circle cx="57" cy="27" r="3.6" fill="#4A2C17"/>
      <circle cx="60" cy="55" r="4.2" fill="#4A2C17"/>
      <circle cx="30" cy="58" r="3.4" fill="#4A2C17"/>
      <circle cx="45" cy="44" r="3" fill="#4A2C17"/>
      <circle cx="43" cy="66" r="2.6" fill="#4A2C17"/>
      <!-- texture speckle -->
      <circle cx="38" cy="47" r="1" fill="#8B5A2B" opacity="0.6"/>
      <circle cx="53" cy="40" r="1" fill="#8B5A2B" opacity="0.6"/>
      <circle cx="47" cy="57" r="1" fill="#8B5A2B" opacity="0.6"/>
    </g>

    <!-- crumbs: each bursts at its bite's moment, arcs out, falls, fades -->
    <g fill="#D9B476">
      <circle r="2.6">
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.26;0.34;0.4;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="52;72;84" keyTimes="0;0.34;0.4" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="14;16;58" keyTimes="0;0.34;0.4" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle r="2">
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.26;0.36;0.42;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="52;38;28" keyTimes="0;0.36;0.42" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="14;6;56" keyTimes="0;0.36;0.42" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.4" fill="#4A2C17">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5;0.52;0.6;0.66;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="56;56;78;92" keyTimes="0;0.52;0.6;0.66" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="52;52;46;90" keyTimes="0;0.52;0.6;0.66" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle r="1.8">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5;0.52;0.62;0.68;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="56;56;66;72" keyTimes="0;0.52;0.62;0.68" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="52;52;70;96" keyTimes="0;0.52;0.62;0.68" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.2">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.72;0.74;0.82;0.88;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="30;30;14;6" keyTimes="0;0.74;0.82;0.88" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="74;74;76;104" keyTimes="0;0.74;0.82;0.88" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle r="1.6" fill="#4A2C17">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.72;0.74;0.84;0.9;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="30;30;40;46" keyTimes="0;0.74;0.84;0.9" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="74;74;88;108" keyTimes="0;0.74;0.84;0.9" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- ambient -->
  <circle cx="120" cy="90" r="2" fill="#C68642" opacity="0.5">
    <animate attributeName="cy" values="90;70;90" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="905" cy="140" r="2" fill="#E8D5A9" opacity="0.35">
    <animate attributeName="cy" values="140;115;140" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="180" r="1.5" fill="#4DC3FF" opacity="0.4">
    <animate attributeName="cy" values="180;160;180" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="940" cy="70" r="1.5" fill="#C68642" opacity="0.4">
    <animate attributeName="cy" values="70;95;70" dur="9s" repeatCount="indefinite"/>
  </circle>
</svg>
