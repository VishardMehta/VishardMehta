name: Generate stat cards

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Profile repos block bot-token pushes — must use the PAT.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=VishardMehta&show_icons=true&hide=prs,issues&rank_icon=github&bg_color=0A0E14&title_color=E8D5A9&icon_color=C68642&text_color=C9D1D9&border_color=1B2431
          path: cards/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=VishardMehta&layout=compact&langs_count=8&bg_color=0A0E14&title_color=E8D5A9&text_color=C9D1D9&border_color=1B2431
          path: cards/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards/*.svg
          git commit -m "chore: refresh stat cards" || exit 0
          git push
