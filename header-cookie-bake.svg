<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="gridB" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#141C28" stroke-width="1"/>
    </pattern>

    <linearGradient id="sweepB" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="480" y2="0" spreadMethod="reflect">
      <stop offset="0" stop-color="#E8D5A9"/>
      <stop offset="0.45" stop-color="#C68642"/>
      <stop offset="1" stop-color="#4DC3FF"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="960 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="doughB" cx="0.42" cy="0.38" r="0.72">
      <stop offset="0" stop-color="#EFDCB4"/>
      <stop offset="0.6" stop-color="#D9B476"/>
      <stop offset="1" stop-color="#8B5A2B"/>
    </radialGradient>

    <filter id="glowB" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="ringGlowB" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="scanB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8D5A9" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#E8D5A9" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#E8D5A9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="260" rx="12" fill="#0A0E14"/>
  <rect width="1000" height="260" rx="12" fill="url(#gridB)"/>
  <rect x="0" width="1000" height="50" fill="url(#scanB)">
    <animate attributeName="y" values="-50;260" dur="7s" repeatCount="indefinite"/>
  </rect>

  <g stroke="#C68642" stroke-width="2" opacity="0.7" fill="none">
    <path d="M14 34 V22 a8 8 0 0 1 8-8 H34"/>
    <path d="M966 14 H978 a8 8 0 0 1 8 8 V34"/>
    <path d="M14 226 V238 a8 8 0 0 0 8 8 H34"/>
    <path d="M986 226 V238 a8 8 0 0 1 -8 8 H966"/>
  </g>

  <text x="40" y="42" font-family="'Courier New', monospace" font-size="14" fill="#8B949E">~/vishard-mehta $</text>
  <g>
    <circle cx="820" cy="37" r="4" fill="#E8D5A9">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="832" y="42" font-family="'Courier New', monospace" font-size="14" fill="#8B949E">STATUS: BAKING...</text>
  </g>

  <text x="500" y="122" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="8" fill="#8B5A2B" opacity="0">
    VISHARD MEHTA
    <animate attributeName="opacity" calcMode="discrete" values="0;0.7;0;0.7;0;0" keyTimes="0;0.41;0.43;0.72;0.74;1" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" calcMode="discrete" values="0 0;3 0;0 0;-3 1;0 0;0 0" keyTimes="0;0.41;0.43;0.72;0.74;1" dur="6s" repeatCount="indefinite"/>
  </text>
  <text x="500" y="122" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="8" fill="url(#sweepB)" filter="url(#glowB)">VISHARD MEHTA</text>

  <text x="500" y="160" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" fill="#8B949E">&gt; ml_engineer &amp;&amp; quant_dev &amp;&amp; systems_thinker</text>
  <rect x="762" y="146" width="9" height="17" fill="#C68642">
    <animate attributeName="opacity" calcMode="discrete" values="1;0" keyTimes="0;0.5" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== THE COOKIE (baking loader) ===== -->
  <g transform="translate(500 200)">
    <!-- steam wisps, only once it's hot -->
    <g stroke="#E8D5A9" stroke-width="1.4" fill="none" stroke-linecap="round">
      <path d="M-9 -30 q-4 -8 0 -15 q4 -7 0 -13" opacity="0">
        <animate attributeName="opacity" values="0;0;0.5;0" keyTimes="0;0.62;0.82;1" dur="8s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0 6;0 -8" keyTimes="0;1" dur="8s" repeatCount="indefinite"/>
      </path>
      <path d="M9 -32 q4 -7 0 -13 q-4 -6 0 -11" opacity="0">
        <animate attributeName="opacity" values="0;0;0.4;0" keyTimes="0;0.68;0.86;1" dur="8s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0 6;0 -10" keyTimes="0;1" dur="8s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- track -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="#1B2431" stroke-width="4"/>

    <!-- bake progress ring: 0 → full over 8s, then snaps back -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="#C68642" stroke-width="4" stroke-linecap="round"
            stroke-dasharray="163.4" stroke-dashoffset="163.4"
            transform="rotate(-90)" filter="url(#ringGlowB)">
      <animate attributeName="stroke-dashoffset" values="163.4;0;0;163.4" keyTimes="0;0.8;0.94;1" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#E8D5A9;#C68642;#8B5A2B;#E8D5A9" keyTimes="0;0.5;0.8;1" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- dough: bakes darker as the ring fills, puffs when done -->
    <g>
      <animateTransform attributeName="transform" type="scale" values="1;1;1.09;1" keyTimes="0;0.78;0.85;0.94" dur="8s" repeatCount="indefinite" additive="sum"/>
      <circle cx="0" cy="0" r="18" fill="url(#doughB)" stroke="#7A4A22" stroke-width="1.2">
        <animate attributeName="opacity" values="0.75;0.88;1;1;0.75" keyTimes="0;0.35;0.7;0.94;1" dur="8s" repeatCount="indefinite"/>
      </circle>

      <!-- chips pop in one by one as it bakes -->
      <circle cx="-8" cy="-8" r="1.5" fill="#4A2C17">
        <animate attributeName="r" values="1.5;1.5;3.4;3.4;1.5" keyTimes="0;0.14;0.2;0.94;1" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="9" cy="-11" r="1.3" fill="#4A2C17">
        <animate attributeName="r" values="1.3;1.3;2.8;2.8;1.3" keyTimes="0;0.28;0.34;0.94;1" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="12" cy="7" r="1.4" fill="#4A2C17">
        <animate attributeName="r" values="1.4;1.4;3.2;3.2;1.4" keyTimes="0;0.42;0.48;0.94;1" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-11" cy="9" r="1.2" fill="#4A2C17">
        <animate attributeName="r" values="1.2;1.2;2.6;2.6;1.2" keyTimes="0;0.56;0.62;0.94;1" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="1.0" fill="#4A2C17">
        <animate attributeName="r" values="1.0;1.0;2.2;2.2;1.0" keyTimes="0;0.7;0.76;0.94;1" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- orbiting crumbs -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="9s" repeatCount="indefinite"/>
      <circle cx="0" cy="-36" r="2.2" fill="#D9B476" opacity="0.8"/>
      <circle cx="31" cy="18" r="1.6" fill="#8B5A2B" opacity="0.7"/>
      <circle cx="-29" cy="19" r="1.9" fill="#4DC3FF" opacity="0.5"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="13s" repeatCount="indefinite"/>
      <circle cx="0" cy="42" r="1.5" fill="#E8D5A9" opacity="0.6"/>
      <circle cx="-38" cy="-12" r="1.3" fill="#C68642" opacity="0.7"/>
    </g>
  </g>

  <!-- ambient -->
  <circle cx="120" cy="90" r="2" fill="#C68642" opacity="0.5">
    <animate attributeName="cy" values="90;70;90" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="905" cy="140" r="2" fill="#E8D5A9" opacity="0.35">
    <animate attributeName="cy" values="140;115;140" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="180" r="1.5" fill="#4DC3FF" opacity="0.4">
    <animate attributeName="cy" values="180;160;180" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="940" cy="70" r="1.5" fill="#C68642" opacity="0.4">
    <animate attributeName="cy" values="70;95;70" dur="9s" repeatCount="indefinite"/>
  </circle>
</svg>
